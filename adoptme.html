<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>AdoptMe</title>
        <link rel="stylesheet" href="style/index.css" />
        <script src="adoptme.js"></script>
    </head>
    <body>
        <h1>HomeForme</h1>
        <h2 style="text-align: left">Adoption Form</h2>
        <form id="adoptform" onsubmit="return validateAndSubmit()">
            <h3 class="adoptHead" style="font-size: 50px">Adopter Personal Info:</h3>
            <label for="names">Firstname & Lastname: </label>
            <input type="text" id="names" name="names" required /><br /><br />
            <label for="tel">Telephone Number: </label>
            <input type="tel" id="tel" name="tel" required /> <br />
            <br />
            <label for="email">Email: </label>
            <input type="email" id="email" name="email" />

            <h3 class="adoptHeader" style="font-size: 50px">Adopter Envoirment Info:</h3>
            <label for="address">Address: </label>
            <input type="text" id="address" name="address" /><br /><br />

            <label for="houseType">Choose a house type:</label>
            <select id="houseType" name="houseType" >
                <option value="" disabled selected>Select a house type...</option>
                <option value="gardenHouse">Garden House</option>
                <option value="singleHouse">Single House</option>
                <option value="townHouse">TownHouse</option>
                <option value="apartment">Condominium/Apartment</option>
            </select>
            <br /><br />
            <input
                class="pettingType"
                name="petting"
                type="radio"
                style="transform: scale(1.5); margin-right: 10px"
                value="inpetting" />
            <label for="petting">Inside Petting</label>
            <input
                class="pettingType"
                name="petting"
                type="radio"
                style="transform: scale(1.5); margin-right: 10px"
                value="outpetting" />
            <label for="petting"> Outside Petting</label> <br /><br />
            <label for="amount">Amount of owned pets: </label>
            <input type="number" id="amount" name="amount" required /><br /><br />
            <input id="interestCheck" type="checkbox" style="transform: scale(1.5); margin-right: 10px" /> Submitting
            this form is an expression of interest and *does not* guarantee the adoption of the dog.

            <br /><br />
            <input
                type="submit"
                style="width: 200px; height: 100px; font-size: 30px; padding: 10px 0; cursor: pointer"
                value="Submit Form" />
        </form>
        <p style="text-align: center; size: 40px">6833071021 Napat Putsorn</p>
    </body>
</html>
